<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Size Guide — Dashboard</title>
<style>
  body { font-family: -apple-system, sans-serif; margin: 0; padding: 24px; background: #f6f6f7; color: #1a1a1a; }
  h1 { font-size: 22px; margin-bottom: 24px; }
  .cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 24px; }
  .card { background: white; border-radius: 8px; padding: 20px; border: 1px solid #e1e3e5; }
  .card .label { font-size: 13px; color: #666; margin-bottom: 8px; }
  .card .value { font-size: 32px; font-weight: 600; }
  .section { background: white; border-radius: 8px; padding: 20px; border: 1px solid #e1e3e5; margin-bottom: 16px; }
  .section h2 { font-size: 16px; margin: 0 0 16px; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; padding: 8px; color: #666; border-bottom: 1px solid #e1e3e5; }
  td { padding: 10px 8px; border-bottom: 1px solid #f1f1f1; }
  .bar-wrap { display: flex; align-items: center; gap: 8px; }
  .bar-bg { background: #e1e3e5; border-radius: 4px; height: 8px; width: 100px; }
  .bar-fill { background: #008060; border-radius: 4px; height: 8px; }
  .size-badge { font-weight: 600; background: #f6f6f7; padding: 2px 8px; border-radius: 4px; }
  .refresh { font-size: 13px; color: #666; margin-bottom: 16px; }
  input[type=password] { padding: 8px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; width: 200px; }
  button { padding: 8px 16px; background: #008060; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; }
  #login { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; }
</style>
</head>
<body>
<h1>AI Size Guide — Dashboard</h1>
<div id="login">
  <input type="password" id="pwd" placeholder="Passwort" onkeydown="if(event.key==='Enter')load()">
  <button onclick="load()">Laden</button>
  <span id="status" style="font-size:13px;color:#666;"></span>
</div>
<div id="content" style="display:none">
  <div class="refresh" id="refresh-info"></div>
  <div class="cards">
    <div class="card"><div class="label">Empfehlungen gesamt</div><div class="value" id="total">—</div></div>
    <div class="card"><div class="label">Heute</div><div class="value" id="today">—</div></div>
    <div class="card"><div class="label">Produkte</div><div class="value" id="products">—</div></div>
  </div>
  <div id="product-stats"></div>
  <div class="section">
    <h2>Letzte 50 Empfehlungen</h2>
    <table>
      <thead><tr><th>Zeitpunkt</th><th>Produkt</th><th>Größe</th><th>Figurtyp</th><th>BH-Größe</th><th>Größe/Gewicht</th></tr></thead>
      <tbody id="recent"></tbody>
    </table>
  </div>
</div>
<script>
const SUPABASE_URL = 'https://pamqejkcntkznqgzwxzc.supabase.co';

async function load() {
  const pwd = document.getElementById('pwd').value;
  if (pwd !== 'tates2026') { document.getElementById('status').textContent = 'Falsches Passwort'; return; }
  document.getElementById('status').textContent = 'Lade...';

  const res = await fetch(SUPABASE_URL + '/rest/v1/recommendations?select=*&order=created_at.desc&limit=500', {
    headers: { apikey: pwd === 'tates2026' ? 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBhbXFlamtjbnRrem5xZ3p3eHpjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDQyMjQ1ODQsImV4cCI6MjA1OTgwMDU4NH0.IG5MR0c8V_aVRFt6-9Pd0-vl8S5CWR4Ng8YAnO8wF7s' : '' }
  });

  if (!res.ok) { document.getElementById('status').textContent = 'Fehler beim Laden'; return; }
  const data = await res.json();

  document.getElementById('status').textContent = '';
  document.getElementById('content').style.display = 'block';
  document.getElementById('refresh-info').textContent = 'Zuletzt geladen: ' + new Date().toLocaleString('de-DE');

  const today = data.filter(r => new Date(r.created_at).toDateString() === new Date().toDateString()).length;
  const stats = {};
  for (const r of data) {
    const t = r.product_title || r.product_id || 'Unbekannt';
    if (!stats[t]) stats[t] = {};
    const s = r.recommended_size || '?';
    stats[t][s] = (stats[t][s] || 0) + 1;
  }

  document.getElementById('total').textContent = data.length;
  document.getElementById('today').textContent = today;
  document.getElementById('products').textContent = Object.keys(stats).length;

  let html = '';
  for (const [product, sizes] of Object.entries(stats)) {
    const total = Object.values(sizes).reduce((a,b) => a+b, 0);
    html += '<div class="section"><h2>' + product + ' <span style="font-weight:400;font-size:13px;color:#666;">(' + total + ' Empfehlungen)</span></h2><table><thead><tr><th>Größe</th><th>Anzahl</th><th>Anteil</th></tr></thead><tbody>';
    for (const [size, count] of Object.entries(sizes).sort((a,b) => b[1]-a[1])) {
      const pct = Math.round(count/total*100);
      html += '<tr><td><span class="size-badge">' + size + '</span></td><td>' + count + '</td><td><div class="bar-wrap"><div class="bar-bg"><div class="bar-fill" style="width:' + pct + 'px"></div></div>' + pct + '%</div></td></tr>';
    }
    html += '</tbody></table></div>';
  }
  document.getElementById('product-stats').innerHTML = html;

  let rows = '';
  for (const r of data.slice(0, 50)) {
    rows += '<tr><td>' + new Date(r.created_at).toLocaleString('de-DE') + '</td><td>' + (r.product_title||'-') + '</td><td><span class="size-badge">' + (r.recommended_size||'-') + '</span></td><td>' + (r.figure_type||'-') + '</td><td>' + (r.cup_size||'-') + '</td><td>' + (r.height||'-') + 'cm / ' + (r.weight||'-') + 'kg</td></tr>';
  }
  document.getElementById('recent').innerHTML = rows;
}
</script>
</body>
</html>
