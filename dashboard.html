<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Size Guide Dashboard</title>
<style>
  body{font-family:-apple-system,sans-serif;margin:0;padding:24px;background:#f6f6f7;color:#1a1a1a}
  h1{font-size:22px;margin-bottom:24px}
  .cards{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:24px}
  .card{background:white;border-radius:8px;padding:20px;border:1px solid #e1e3e5}
  .card .label{font-size:13px;color:#666;margin-bottom:8px}
  .card .value{font-size:32px;font-weight:600}
  .section{background:white;border-radius:8px;padding:20px;border:1px solid #e1e3e5;margin-bottom:16px}
  .section h2{font-size:16px;margin:0 0 16px}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th{text-align:left;padding:8px;color:#666;border-bottom:1px solid #e1e3e5}
  td{padding:10px 8px;border-bottom:1px solid #f1f1f1}
  .bar-wrap{display:flex;align-items:center;gap:8px}
  .bar-bg{background:#e1e3e5;border-radius:4px;height:8px;width:100px}
  .bar-fill{background:#008060;border-radius:4px;height:8px}
  .badge{font-weight:600;background:#f6f6f7;padding:2px 8px;border-radius:4px}
  input[type=password]{padding:8px 12px;border:1px solid #ddd;border-radius:6px;font-size:14px;width:200px}
  button{padding:8px 16px;background:#008060;color:white;border:none;border-radius:6px;cursor:pointer;font-size:14px}
  #login{display:flex;align-items:center;gap:12px;margin-bottom:24px}
  #err{font-size:13px;color:#d82c0d}
</style>
</head>
<body>
<h1>AI Size Guide — Dashboard</h1>
<div id="login">
  <input type="password" id="pwd" placeholder="Passwort">
  <button id="btn">Laden</button>
  <span id="err"></span>
</div>
<div id="content" style="display:none">
  <div style="font-size:13px;color:#666;margin-bottom:16px" id="ts"></div>
  <div class="cards">
    <div class="card"><div class="label">Gesamt</div><div class="value" id="total">—</div></div>
    <div class="card"><div class="label">Heute</div><div class="value" id="today">—</div></div>
    <div class="card"><div class="label">Produkte</div><div class="value" id="prods">—</div></div>
  </div>
  <div id="stats"></div>
  <div class="section">
    <h2>Letzte 50 Empfehlungen</h2>
    <table>
      <thead><tr><th>Zeitpunkt</th><th>Produkt</th><th>Größe</th><th>Figurtyp</th><th>BH</th><th>cm/kg</th></tr></thead>
      <tbody id="rows"></tbody>
    </table>
  </div>
</div>
<script>
document.getElementById('btn').addEventListener('click', function() {
  var pwd = document.getElementById('pwd').value;
  document.getElementById('err').textContent = 'Lade...';
  fetch('/api/dashboard-data', {
    headers: { 'x-dashboard-password': pwd }
  }).then(function(res) {
    if (res.status === 401) { document.getElementById('err').textContent = 'Falsches Passwort'; return null; }
    if (!res.ok) { document.getElementById('err').textContent = 'Fehler beim Laden'; return null; }
    return res.json();
  }).then(function(data) {
    if (!data) return;
    document.getElementById('err').textContent = '';
    document.getElementById('content').style.display = 'block';
    document.getElementById('ts').textContent = 'Geladen: ' + new Date().toLocaleString('de-DE');
    var today = data.filter(function(r) {
      return new Date(r.created_at).toDateString() === new Date().toDateString();
    }).length;
    var stats = {};
    data.forEach(function(r) {
      var t = r.product_title || r.product_id || 'Unbekannt';
      if (!stats[t]) stats[t] = {};
      var s = r.recommended_size || '?';
      stats[t][s] = (stats[t][s] || 0) + 1;
    });
    document.getElementById('total').textContent = data.length;
    document.getElementById('today').textContent = today;
    document.getElementById('prods').textContent = Object.keys(stats).length;
    var html = '';
    Object.keys(stats).forEach(function(product) {
      var sizes = stats[product];
      var total = Object.values(sizes).reduce(function(a,b){return a+b;}, 0);
      html += '<div class="section"><h2>' + product + ' <span style="font-weight:400;font-size:13px;color:#666;">(' + total + ')</span></h2><table><thead><tr><th>Größe</th><th>Anzahl</th><th>Anteil</th></tr></thead><tbody>';
      Object.entries(sizes).sort(function(a,b){return b[1]-a[1];}).forEach(function(e) {
        var pct = Math.round(e[1]/total*100);
        html += '<tr><td><span class="badge">' + e[0] + '</span></td><td>' + e[1] + '</td><td><div class="bar-wrap"><div class="bar-bg"><div class="bar-fill" style="width:' + pct + 'px"></div></div>' + pct + '%</div></td></tr>';
      });
      html += '</tbody></table></div>';
    });
    document.getElementById('stats').innerHTML = html;
    var rows = '';
    data.slice(0,50).forEach(function(r) {
      rows += '<tr><td>' + new Date(r.created_at).toLocaleString('de-DE') + '</td><td>' + (r.product_title||'-') + '</td><td><span class="badge">' + (r.recommended_size||'-') + '</span></td><td>' + (r.figure_type||'-') + '</td><td>' + (r.cup_size||'-') + '</td><td>' + (r.height||'-') + '/' + (r.weight||'-') + '</td></tr>';
    });
    document.getElementById('rows').innerHTML = rows;
  }).catch(function(e) {
    document.getElementById('err').textContent = 'Fehler: ' + e.message;
  });
});
</script>
</body>
</html>
